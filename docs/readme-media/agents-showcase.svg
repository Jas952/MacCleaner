<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#dce3ee" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#172033" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fc" stop-opacity="0"/>
      <stop offset="1" stop-color="#f7f9fc" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1040" fill="#f7f9fc"/>
  <rect width="1600" height="1040" fill="url(#grid)" opacity="0.78"/>

  <image xlink:href="../../MacCleaner/Assets.xcassets/AppIcon.appiconset/icon_512x512.png" x="104" y="82" width="88" height="88"/>
  <text x="224" y="124" fill="#111827" font-size="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="650">Agent Workload at a Glance</text>
  <text x="224" y="166" fill="#526078" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Processes, memory, MCP, skills, components, and indexes — all measured locally.</text>

  <g filter="url(#shadow)">
    <image xlink:href="../images/agents.png" x="76" y="232" width="1448" height="923" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <rect x="0" y="910" width="1600" height="130" fill="url(#bottomFade)"/>
</svg>
