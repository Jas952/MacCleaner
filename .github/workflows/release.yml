name: Release MacCleaner

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Validate release notes version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXPECTED_TITLE="# MacCleaner $VERSION"
          ACTUAL_TITLE="$(head -n 1 MacCleaner/ReleaseNotes.md)"
          if [[ "$ACTUAL_TITLE" != "$EXPECTED_TITLE" ]]; then
            echo "Release notes title '$ACTUAL_TITLE' does not match tag '$GITHUB_REF_NAME'."
            exit 1
          fi

      - name: Resolve Sparkle publishing tools
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MacCleaner.xcodeproj \
            -scheme MacCleaner \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/SourcePackages"

      - name: Build unsigned DMG
        env:
          SOURCE_PACKAGES_DIR: ${{ runner.temp }}/SourcePackages
        run: ./scripts/build_dmg.sh

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp MacCleaner/ReleaseNotes.md "release/MacCleaner.md"
          APPCAST_TOOL="$(find "$RUNNER_TEMP/SourcePackages/artifacts" -type f -name generate_appcast -print -quit)"
          rm -f appcast.xml
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$APPCAST_TOOL" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/Jas952/MacCleaner/releases/download/$GITHUB_REF_NAME/" \
            --link "https://github.com/Jas952/MacCleaner" \
            --embed-release-notes \
            -o appcast.xml \
            release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/MacCleaner.dmg --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --title "MacCleaner ${GITHUB_REF_NAME#v}" \
              --notes-file MacCleaner/ReleaseNotes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              release/MacCleaner.dmg \
              --title "MacCleaner ${GITHUB_REF_NAME#v}" \
              --notes-file MacCleaner/ReleaseNotes.md \
              --verify-tag
          fi

      - name: Publish appcast on main
        run: |
          cp appcast.xml "$RUNNER_TEMP/appcast.xml"
          git fetch origin main
          git checkout main
          cp "$RUNNER_TEMP/appcast.xml" appcast.xml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add appcast.xml
          git diff --cached --quiet || git commit -m "Update appcast for $GITHUB_REF_NAME"
          git push origin main
